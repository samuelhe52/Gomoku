name: Release

on:
  push:
    tags:
      - 'v*.*.*'
  workflow_dispatch:
    inputs:
      tag_name:
        description: 'Release tag name (e.g. v1.0.0)'
        required: true
        default: 'v1.0.0'

permissions:
  contents: read

jobs:
  build:
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
      fail-fast: false

    runs-on: ${{ matrix.os }}

    steps:
    - uses: actions/checkout@v4

    - name: Install Qt
      uses: jurplel/install-qt-action@v4
      timeout-minutes: 15
      with:
        version: '6.8.0'
        cache: true
        cache-key-prefix: ${{ runner.os }}-qt

    - name: Configure CMake
      run: cmake -B build -DCMAKE_BUILD_TYPE=Release

    - name: Build
      run: cmake --build build --config Release

    - name: Package Windows Application with Qt DLLs
      if: runner.os == 'Windows'
      run: |
        mkdir deploy
        cp build/Release/Gomoku.exe deploy/
        windeployqt deploy/Gomoku.exe --release --no-translations
      shell: bash

    - name: Upload artifacts (Windows)
      if: runner.os == 'Windows'
      uses: actions/upload-artifact@v4
      with:
        name: gomoku-${{ matrix.os }}
        path: deploy/

    - name: Upload artifacts (Unix)
      if: runner.os != 'Windows'
      uses: actions/upload-artifact@v4
      with:
        name: gomoku-${{ matrix.os }}
        path: build/Gomoku

  release:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
    - name: Determine tag name
      id: tag
      run: |
        if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
          echo "name=${{ github.event.inputs.tag_name }}" >> $GITHUB_OUTPUT
        else
          echo "name=${GITHUB_REF_NAME}" >> $GITHUB_OUTPUT
        fi

    - name: Download all artifacts
      uses: actions/download-artifact@v4
      with:
        path: artifacts/

    - name: Package artifacts
      run: |
        cd artifacts
        zip -r ../gomoku-windows-latest.zip gomoku-windows-latest/
        zip -r ../gomoku-macos-latest.zip gomoku-macos-latest/
        zip -r ../gomoku-ubuntu-latest.zip gomoku-ubuntu-latest/

    - name: Determine if pre-release
      id: prerelease
      env:
        TAG: ${{ steps.tag.outputs.name }}
      run: |
        if echo "$TAG" | grep -qiE '(alpha|beta|rc)'; then
          echo "value=true" >> $GITHUB_OUTPUT
        else
          echo "value=false" >> $GITHUB_OUTPUT
        fi

    - name: Create GitHub Release
      uses: softprops/action-gh-release@v2
      with:
        tag_name: ${{ steps.tag.outputs.name }}
        name: Gomoku ${{ steps.tag.outputs.name }}
        draft: false
        prerelease: ${{ steps.prerelease.outputs.value }}
        generate_release_notes: true
        files: |
          gomoku-windows-latest.zip
          gomoku-macos-latest.zip
          gomoku-ubuntu-latest.zip
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
